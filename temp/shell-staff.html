<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Titan Journal CRM - Staff Role</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c3222d",
                        "background-light": "#f8f6f6",
                        "background-dark": "#080810",
                        "surface-dark": "#0E0E1A",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 overflow-hidden">
<!-- iOS Status Bar Placeholder -->
<div class="h-12 w-full flex items-center justify-between px-6 bg-surface-dark sticky top-0 z-50">
<span class="text-sm font-semibold">9:41</span>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-sm">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-sm">wifi</span>
<span class="material-symbols-outlined text-sm rotate-90">battery_full</span>
</div>
</div>
<!-- Main Container -->
<div class="flex flex-col h-screen max-h-screen">
<!-- Top Header -->
<header class="h-[52px] bg-surface-dark border-b border-slate-800/50 flex items-center px-4 justify-between shrink-0">
<div class="flex items-center gap-3">
<!-- Role Badge -->
<div class="size-8 rounded-full bg-slate-700 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-400 text-lg">badge</span>
</div>
<h1 class="text-lg font-bold tracking-tight">My Tasks</h1>
</div>
<div class="flex items-center gap-2">
<button class="size-10 flex items-center justify-center text-slate-400 hover:text-slate-100 transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
<div class="size-8 rounded-full border border-slate-700 overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Professional user profile headshot" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB8AAZ04Rtzz0f1Py5zkxAMAnuMQe5pvQDBi_0mH3O7I-ZTa68lmWJqd5uDk_3XCZlqj5PwyLSpQjc3d9JpuwczMEyTqHDUsYXcmjn6rRx03WK6btgb26AaxKFecqcQP6Sb-k4HPuV4SREQ8yeNAvCJ5HVJ8mAVkyIPiBCZtKNNMUBGEGOPKbdmv9E2vCxYwnEeW8iem1hZdhfhnkvY39iLh5pImgl9Bc9x_8Yb3fANyRrbOq_7439tQTyI58ixUWAsXJfJWqa9Vzmp"/>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto p-4 space-y-4">
<!-- Staff Role Workspace Placeholder -->
<div class="flex flex-col items-center justify-center h-full min-h-[400px] border-2 border-dashed border-slate-800 rounded-xl bg-surface-dark/30">
<div class="p-6 bg-primary/10 rounded-full mb-4">
<span class="material-symbols-outlined text-primary text-4xl">assignment_late</span>
</div>
<h2 class="text-xl font-bold mb-2">Workspace Ready</h2>
<p class="text-slate-400 text-center max-w-[240px] text-sm leading-relaxed">
                    Welcome, Staff Member. Your dashboard content will appear here.
                </p>
<button class="mt-8 bg-primary hover:bg-primary/90 text-white px-6 py-2.5 rounded-full font-bold text-sm transition-all shadow-lg shadow-primary/20">
                    Create New Task
                </button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="bg-surface-dark border-t border-slate-800/50 pt-3 pb-safe-area-bottom h-[90px] shrink-0">
<div class="flex items-center justify-around h-full max-w-md mx-auto">
<!-- Active Tab: Tasks -->
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="relative flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[28px] fill-1">task_alt</span>
</div>
<span class="text-[11px] font-bold text-primary tracking-wide">Tasks</span>
</a>
<!-- Leads -->
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="relative flex items-center justify-center text-slate-500 group-active:text-slate-300">
<span class="material-symbols-outlined text-[28px]">group</span>
</div>
<span class="text-[11px] font-medium text-slate-500 tracking-wide">Leads</span>
</a>
<!-- Verify with Notification Badge -->
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="relative flex items-center justify-center text-slate-500 group-active:text-slate-300">
<span class="material-symbols-outlined text-[28px]">verified_user</span>
<span class="absolute -top-1 -right-1.5 size-4 bg-primary text-[10px] text-white font-bold flex items-center justify-center rounded-full border border-surface-dark">5</span>
</div>
<span class="text-[11px] font-medium text-slate-500 tracking-wide">Verify</span>
</a>
<!-- More -->
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="relative flex items-center justify-center text-slate-500 group-active:text-slate-300">
<span class="material-symbols-outlined text-[28px]">more_horiz</span>
</div>
<span class="text-[11px] font-medium text-slate-500 tracking-wide">More</span>
</a>
</div>
<!-- iOS Home Indicator -->
<div class="flex justify-center mt-2 mb-1">
<div class="w-32 h-1 bg-slate-700/50 rounded-full"></div>
</div>
</nav>
</div>
</body></html>
